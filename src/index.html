<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>Inkdown</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Title bar / toolbar (draggable) -->
    <header id="toolbar">
      <div class="tb-group tb-left">
        <select id="block-style" class="tb-select" title="Stile del paragrafo">
          <option value="paragraph">Corpo</option>
          <option value="h1">Titolo 1</option>
          <option value="h2">Titolo 2</option>
          <option value="h3">Titolo 3</option>
          <option value="h4">Titolo 4</option>
        </select>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <button class="tb-btn" data-cmd="bold" title="Grassetto (⌘B)" aria-label="Grassetto">
          <svg viewBox="0 0 24 24"><path d="M6 4h7a4 4 0 0 1 0 8H6zM6 12h8a4 4 0 0 1 0 8H6z"/></svg>
        </button>
        <button class="tb-btn" data-cmd="italic" title="Corsivo (⌘I)" aria-label="Corsivo">
          <svg viewBox="0 0 24 24"><path d="M19 4h-9M14 20H5M15 4 9 20"/></svg>
        </button>
        <button class="tb-btn" data-cmd="underline" title="Sottolineato (⌘U)" aria-label="Sottolineato">
          <svg viewBox="0 0 24 24"><path d="M6 4v6a6 6 0 0 0 12 0V4M4 21h16"/></svg>
        </button>
        <button class="tb-btn" data-cmd="strike" title="Barrato" aria-label="Barrato">
          <svg viewBox="0 0 24 24"><path d="M16 4H9a3 3 0 0 0-2.83 4M14 12a4 4 0 0 1 0 8H6M4 12h16"/></svg>
        </button>
        <button class="tb-btn" data-cmd="code" title="Codice in linea (⌘E)" aria-label="Codice">
          <svg viewBox="0 0 24 24"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>
        </button>
        <button class="tb-btn" data-cmd="highlight" title="Evidenzia" aria-label="Evidenzia">
          <svg viewBox="0 0 24 24"><path d="m9 11-6 6v3h3l6-6M12.5 7.5 16 4l4 4-3.5 3.5M14 6l4 4"/></svg>
        </button>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <button class="tb-btn" data-cmd="bulletList" title="Elenco puntato" aria-label="Elenco puntato">
          <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        </button>
        <button class="tb-btn" data-cmd="orderedList" title="Elenco numerato" aria-label="Elenco numerato">
          <svg viewBox="0 0 24 24"><path d="M10 6h11M10 12h11M10 18h11M4 6h1v4M4 10h2M6 18H4l2-2.5V14H4"/></svg>
        </button>
        <button class="tb-btn" data-cmd="taskList" title="Elenco di attività" aria-label="Elenco di attività">
          <svg viewBox="0 0 24 24"><path d="M3 5l2 2 3-3M3 13l2 2 3-3M11 6h10M11 14h10M3 21l2 0M11 20h10"/></svg>
        </button>
        <button class="tb-btn" data-cmd="blockquote" title="Citazione" aria-label="Citazione">
          <svg viewBox="0 0 24 24"><path d="M6 17h3l2-4V7H5v6h3zM14 17h3l2-4V7h-6v6h3z"/></svg>
        </button>
        <button class="tb-btn" data-cmd="codeBlock" title="Blocco di codice" aria-label="Blocco di codice">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m9 10-2 2 2 2M15 10l2 2-2 2"/></svg>
        </button>
        <button class="tb-btn" data-cmd="hr" title="Linea orizzontale" aria-label="Linea orizzontale">
          <svg viewBox="0 0 24 24"><path d="M3 12h18"/></svg>
        </button>
        <button class="tb-btn" data-cmd="link" title="Link (⌘K)" aria-label="Link">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
        </button>
      </div>

      <div class="tb-spacer"></div>

      <div class="tb-group tb-right">
        <button class="tb-btn" data-cmd="fontDown" title="Riduci dimensione testo (⌘−)" aria-label="Riduci testo">
          <svg viewBox="0 0 24 24"><path d="M4 19 9 5l5 14M6 13h6M16 11h6"/></svg>
        </button>
        <button class="tb-btn" data-cmd="fontUp" title="Aumenta dimensione testo (⌘+)" aria-label="Aumenta testo">
          <svg viewBox="0 0 24 24"><path d="M2 19 7 5l5 14M4 13h6M19 8v6M16 11h6"/></svg>
        </button>
        <div class="tb-divider"></div>
        <button class="tb-btn" data-cmd="toggleFont" title="Carattere serif / sans (⇧⌘F)" aria-label="Carattere">
          <svg viewBox="0 0 24 24"><path d="M4 7V5h16v2M9 5v14M7 19h4M15 11v8M13 19h4M13 11h4"/></svg>
        </button>
        <button class="tb-btn" data-cmd="toggleTheme" title="Tema chiaro / scuro (⇧⌘L)" aria-label="Tema">
          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button class="tb-btn" data-cmd="settings" title="Impostazioni (⌘,)" aria-label="Impostazioni">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Find & replace bar -->
    <div id="findbar" aria-hidden="true">
      <div class="find-row">
        <svg class="find-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="find-input" type="text" placeholder="Trova" autocomplete="off" spellcheck="false" />
        <span id="find-count" class="find-count">0/0</span>
        <button id="find-case" class="find-mini" title="Maiuscole/minuscole">Aa</button>
        <button id="find-prev" class="find-mini" title="Precedente (⇧↵)">
          <svg viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
        </button>
        <button id="find-next" class="find-mini" title="Successivo (↵)">
          <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <button id="find-close" class="find-mini" title="Chiudi (Esc)">
          <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="find-row">
        <svg class="find-icon" viewBox="0 0 24 24"><path d="M14 4l6 6M3 21l3-1 11-11-2-2L4 18z"/></svg>
        <input id="replace-input" type="text" placeholder="Sostituisci con" autocomplete="off" spellcheck="false" />
        <button id="replace-one" class="find-text-btn">Sostituisci</button>
        <button id="replace-all" class="find-text-btn">Tutti</button>
      </div>
    </div>

    <!-- Document -->
    <main id="scroll">
      <div id="editor"></div>
    </main>

    <!-- Status bar -->
    <footer id="statusbar">
      <span id="status-file">Nuovo documento</span>
      <span class="status-sep"></span>
      <span id="status-saved" class="status-dim"></span>
      <span class="status-grow"></span>
      <span id="status-zoom" class="status-dim">100%</span>
      <span class="status-sep"></span>
      <span id="status-words" class="status-dim">0 parole</span>
    </footer>

    <!-- Settings -->
    <div id="settings-overlay" aria-hidden="true">
      <div id="settings-panel" role="dialog" aria-modal="true" aria-label="Impostazioni">
        <div class="set-head">
          <span class="set-title">Impostazioni</span>
          <button id="set-close" class="set-x" aria-label="Chiudi">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="set-row">
          <span class="set-label">Tema</span>
          <div class="set-seg" id="set-theme">
            <button data-theme-val="light">Chiaro</button>
            <button data-theme-val="dark">Scuro</button>
            <button data-theme-val="system">Sistema</button>
          </div>
        </div>
        <div class="set-row">
          <span class="set-label">Carattere</span>
          <div class="set-seg" id="set-font">
            <button data-font-val="sans">Sans</button>
            <button data-font-val="serif">Serif</button>
          </div>
        </div>
        <div class="set-row">
          <span class="set-label">Dimensione testo</span>
          <div class="set-size">
            <button id="set-size-down" aria-label="Riduci testo">A−</button>
            <span id="set-size-val">100%</span>
            <button id="set-size-up" aria-label="Aumenta testo">A+</button>
            <button id="set-size-reset">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
